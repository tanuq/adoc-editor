<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsciiDoc Editor</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <span>Files</span>
        <button id="btn-new-file" title="New file" aria-label="New file">+</button>
      </div>
      <ul id="file-tree"></ul>
    </div>
    <div id="main">
      <div id="toolbar">
        <span id="toolbar-filename">—</span>
        <div id="toolbar-actions">
          <button id="btn-export-html">Save as HTML</button>
          <button id="btn-keybinding">Vim</button>
        </div>
      </div>
      <div id="editor-preview">
        <div id="editor-pane"></div>
        <div id="preview-pane">
          <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
        </div>
      </div>
      <div id="statusbar" role="status">
        <span id="status-message">Ready</span>
        <span id="status-right">
          <span id="status-keymap">Vim</span>
          <span id="status-cursor">Ln 1, Col 1</span>
        </span>
      </div>
    </div>
  </div>
  <script type="module" src="bundle.js"></script>
</body>
</html>
